<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝒁𝒂𝒓𝒗𝒊𝒐𝒏 ꨄ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Basic Reset --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }

        /* --- BACKGROUND VIDEO FIX --- */
        /* Ye CSS video ko force karegi screen par hamesha dikhne ke liye */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -10;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -5;
        }

        /* --- CLICK TO ENTER SCREEN --- */
        #entry {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; z-index: 1000;
            cursor: pointer; color: #fff; letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- MAIN UI (Mashed Up Fix) --- */
        #main-wrapper {
            display: none;
            width: 100%; height: 100%;
            position: relative;
            z-index: 10;
        }

        #main-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 400px;
            background: rgba(255,255,255,0.08);
            padding: 30px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white;
        }

        .socials { margin-top: 25px; display: flex; justify-content: center; gap: 30px; font-size: 24px; }
        .socials a { color: white; text-decoration: none; transition: 0.3s; }
        .socials a:hover { color: #888; }
    </style>
</head>
<body>

    <div id="entry" onclick="start()">[ CLICK TO ENTER ]</div>

    <video id="bg-video" autoplay loop playsinline muted>
        <source src="bg.mp4" type="video/mp4">
    </video>
    
    <div class="overlay"></div>

    <audio id="bg-audio" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="main-wrapper">
        <div id="main-content">
            <h1>𝒁𝒂𝒓𝒗𝒊𝒐𝒏 ꨄ</h1>
            <p id="status" style="margin-top: 10px;">Loading Status...</p>
            <div class="socials">
                <a href="https://discord.com/users/1352884385183170594"><i class="fa-brands fa-discord"></i></a>
                <a href="https://www.instagram.com/z4rvion"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        function start() {
            // Screen hatao aur main UI dikhao
            document.getElementById('entry').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'block';
            
            // Media play karo
            const v = document.getElementById('bg-video');
            const a = document.getElementById('bg-audio');
            
            if(v) {
                v.muted = false; 
                v.play().catch(e => console.log("Video wait"));
            }
            if(a) {
                a.play().catch(e => console.log("Audio wait"));
            }
        }

        // Discord Status API
        async function fetchStatus() {
            try {
                const res = await fetch('https://api.lanyard.rest/v1/users/1352884385183170594');
                const data = await res.json();
                if(data.success && data.data) {
                    document.getElementById('status').innerText = data.data.discord_status.toUpperCase();
                }
            } catch(e) { 
                document.getElementById('status').innerText = "OFFLINE"; 
            }
        }
        fetchStatus();
    </script>
</body>
</html>
